<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caroline Barker</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #f7f5f1;
        font-family: "Instrument Sans", system-ui, sans-serif;
      }

      /* ── Full-screen scene ── */
      .scene {
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Café illustration container ── */
      .cafe-wrap {
        position: relative;
        width: min(55vw, calc(68vh * 4 / 3));
        aspect-ratio: 4 / 3;
      }
      @media (max-width: 768px) {
        .cafe-wrap { width: min(96vw, calc(60vh * 4 / 3)); }
      }

      .cafe-wrap {
        animation: fade-in 1s ease forwards;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .cafe-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        pointer-events: none;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
      }

      /* ── Apron swing ── */
      /* transform-origin targets the hanger hook in the full-canvas PNG */
      .ov-apron {
        transform-origin: 14% 33%;
        animation: apron-swing 3.2s ease-in-out infinite;
      }
      @keyframes apron-swing {
        0%   { transform: rotate(-1deg); }
        50%  { transform: rotate(1deg); }
        100% { transform: rotate(-1deg); }
      }

      /* ── Boxes: slow menu-board reveal (9s) ── */
      /* reveal top→bottom over 2.5s, long hold, collapse upward, pause */
      .ov-boxes {
        clip-path: inset(0 0 100% 0);
        animation: boxes-loop 9s linear infinite both;
        animation-delay: 0.3s;
      }
      @keyframes boxes-loop {
        0%   { clip-path: inset(0 0 100% 0); animation-timing-function: cubic-bezier(0.25,0,0.5,1); }
        28%  { clip-path: inset(0 0 0%   0); animation-timing-function: linear; }
        72%  { clip-path: inset(0 0 0%   0); animation-timing-function: ease-in; }
        89%  { clip-path: inset(100% 0 0 0); animation-timing-function: linear; }
        100% { clip-path: inset(100% 0 0 0); }
      }

      .ov-contact {
        clip-path: inset(0 100% 0 0);
        animation: contact-loop 10s linear infinite both;
        animation-delay: 0.4s;
      }
      @keyframes contact-loop {
        0%   { clip-path: inset(0 100% 0 0);  animation-timing-function: cubic-bezier(0.1,0,0.4,1); }
        28%  { clip-path: inset(0 0%   0 0);  animation-timing-function: linear; }
        65%  { clip-path: inset(0 0%   0 0);  animation-timing-function: cubic-bezier(0,0,0.5,1); }
        82%  { clip-path: inset(0 0% 0 100%); animation-timing-function: linear; }
        100% { clip-path: inset(0 0% 0 100%); }
      }

      /* ── Hotspot base ── */
      .hotspot {
        position: absolute;
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.2s ease;
      }
      .hotspot:hover {
        background: rgba(74, 108, 196, 0.08);
        cursor: pointer;
      }
      /* Subtle ring on focus for keyboard nav */
      .hotspot:focus-visible {
        outline: 2px solid #4a6cc4;
        outline-offset: 3px;
      }

      /* Tooltip label */
      .hotspot::after {
        content: attr(data-label);
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: #1c1c1c;
        color: #fff;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      .hotspot:hover::after { opacity: 1; }

      /* ── Individual hotspot positions (% of container) ── */

      /* Apron — left wall */
      .hs-apron {
        top: 32%;
        left: 3%;
        width: 18%;
        height: 62%;
      }

      /* Menu board — hanging center */
      .hs-menu {
        top: 15.6%;
        left: 25%;
        width: 50%;
        height: 44.5%;
      }

      /* Contact Me tent card — counter */
      .hs-contact {
        top: 67.5%;
        left: 63%;
        width: 13.5%;
        height: 18%;
      }

      /* ── Music player ── */
      .ov-music-box {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain;
        pointer-events: none;
      }
      .ov-music-notes {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .ov-music-notes.playing {
        opacity: 1;
        animation: notes-sway 2.5s ease-in-out infinite;
      }
      @keyframes notes-sway {
        0%   { transform: rotate(.5deg); }
        50%  { transform: rotate(-.4deg);  }
        100% { transform: rotate(.5deg); }
      }
      .music-hit {
        position: absolute;
        top: 53%;
        left: 80%;
        width: 8%;
        height: 11%;
        cursor: pointer;
        background: none;
        border: none;
        border-radius: 6px;
        z-index: 10;
        transition: background 0.2s ease;
      }
      .music-hit:hover {
        background: rgba(74, 108, 196, 0.08);
      }
      .music-hit::after {
        content: attr(data-label);
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: #1c1c1c;
        color: #fff;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      .music-hit:hover::after { opacity: 1; }

      /* ── Skip / back link ── */
      .back {
        position: fixed;
        bottom: 1.5rem;
        left: 1.5rem;
        font-size: 0.78rem;
        color: #9a8f80;
        letter-spacing: 0.05em;
        text-decoration: none;
      }
      .back:hover { color: #5a5248; }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="cafe-wrap">

        <img src="assets/img/home-cafe.png" alt="Café illustration with menu, apron, and contact sign">

        <img class="overlay ov-apron"       src="assets/img/apron.png"        alt="">
        <img class="overlay ov-boxes"       src="assets/img/boxes.png"        alt="">
        <img class="overlay ov-contact"     src="assets/img/contact.png"      alt="">
        <img class="ov-music-box"           src="assets/img/music-box.png"    alt="">
        <img class="ov-music-notes" id="musicNotes" src="assets/img/music-notes.png" alt="">
        <button class="music-hit" id="musicBtn" data-label="Music toggle" aria-label="Toggle music"></button>

        <!-- Apron → About -->
        <a class="hotspot hs-apron"
           href="about.html"
           data-label="About me"
           aria-label="About me"></a>

        <!-- Menu board → Portfolio/Experience -->
        <a class="hotspot hs-menu"
           href="experience.html"
           data-label="Experience & projects"
           aria-label="Experience and projects"></a>

        <!-- Contact Me sign → Contact -->
        <a class="hotspot hs-contact"
           href="contact.html"
           data-label="Contact"
           aria-label="Contact"></a>

      </div>
    </div>

    <a class="back" href="index.html">← back to entrance</a>

    <audio id="bgMusic" src="assets/audio/lofi-beats.m4a" loop preload="auto"></audio>

    <script>
      const audio  = document.getElementById('bgMusic');
      const btn    = document.getElementById('musicBtn');
      const notes  = document.getElementById('musicNotes');
      audio.volume = 0.18;

      function setPlaying(on) {
        if (on) { audio.play(); notes.classList.add('playing'); }
        else    { audio.pause(); notes.classList.remove('playing'); }
      }

      audio.play().then(() => notes.classList.add('playing')).catch(() => {});
      btn.addEventListener('click', () => setPlaying(audio.paused));

      // Fade out scene before navigating
      document.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (href && !href.startsWith('mailto:') && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('#')) {
          a.addEventListener('click', e => {
            e.preventDefault();
            const scene = document.querySelector('.scene');
            scene.style.transition = 'opacity 0.4s ease';
            scene.style.opacity = '0';
            setTimeout(() => { window.location.href = href; }, 400);
          });
        }
      });
    </script>
  </body>
</html>
